<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora - Mi Dulce Hogar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{--primary:#2563eb;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background: linear-gradient(180deg,#f1f5f9,#e2e8f0);}


.footer{
  background:#020617;
  color:#e2e8f0;
  margin-top:80px;
}

.footer-container{
  max-width:1200px;
  margin:auto;
  padding:50px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:40px;
}

.footer-col h2 span{
  color:#2563eb;
}

.footer-col h3{
  margin-bottom:15px;
  color:#fff;
}

.footer-col p{
  color:#94a3b8;
  font-size:14px;
}

.footer-col a{
  display:block;
  color:#94a3b8;
  text-decoration:none;
  margin-bottom:8px;
}

.footer-col a:hover{
  color:#fff;
}

.footer-bottom{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.08);
  color:#64748b;
  font-size:13px;
}





/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:15px 20px;position:sticky;top:0;z-index:100;
}

.logo{
  text-transform: uppercase;
}

.logo{
font-weight:700;
font-size:18px;
  cursor:pointer;
}
.logo span{color:var(--primary);}
.menu-btn{font-size:24px;cursor:pointer;}

/* MENU */
.menu{
position:fixed;top:0;right:-100%;
width:80%;height:100%;background:#fff;
padding:30px 20px;transition:.3s;
display:flex;flex-direction:column;gap:20px;z-index:200;
}
.menu.active{right:0;}
.menu a{text-decoration:none;color:#111;font-size:18px;}

/* OVERLAY */
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);
opacity:0;pointer-events:none;transition:.3s;z-index:150;
}
.overlay.active{opacity:1;pointer-events:all;}

/* CONTENIDO */
.container{max-width:600px;margin:auto;padding:40px 20px;}

.calc-box{
background:#fff;padding:25px;border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.calc-box label{
display:block;margin-top:15px;font-size:14px;color:#555;
}

.calc-box input{
width:100%;padding:12px;margin-top:5px;
border-radius:10px;border:1px solid #ccc;
}

.calc-box button{
width:100%;margin-top:20px;padding:12px;
background:var(--primary);color:#fff;
border:none;border-radius:12px;font-size:16px;
}

#resultado{
text-align:center;margin-top:20px;
font-size:28px;color:var(--primary);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Inmobiliaria <span>Mi Dulce Hogar</span></div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="menu">
  <a href="index.html">Propiedades</a>
  <a href="servicios.html">Servicios</a>
  <a href="calculadora.html">Calculadora</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="container">
  <h2 style="text-align:center;margin-bottom:20px;">
    Calculadora Hipotecaria
  </h2>

  <div class="calc-box">

    <label>Precio de la propiedad</label>
    <input type="number" id="precio" value="3000000">

    <label>Enganche (%)</label>
    <input type="number" id="enganche" value="20">

    <label>Tasa de interés (%)</label>
    <input type="number" id="interes" value="9">

    <label>Años</label>
    <input type="number" id="anos" value="20">

    <button onclick="calcular()">Calcular</button>

    <h3 id="resultado">$0</h3>

  </div>
</div>

<script>
function toggleMenu(){
  menu.classList.toggle("active");
  overlay.classList.toggle("active");
}

function calcular(){
  const precio = parseFloat(document.getElementById("precio").value);
  const enganche = parseFloat(document.getElementById("enganche").value)/100;
  const interes = parseFloat(document.getElementById("interes").value)/100/12;
  const meses = parseFloat(document.getElementById("anos").value)*12;

  const monto = precio * (1 - enganche);

  const pago = monto * (interes * Math.pow(1+interes, meses)) /
               (Math.pow(1+interes, meses)-1);

  document.getElementById("resultado").innerText =
    "$" + pago.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}
</script>


<div class="footer">

  <div class="footer-container">

    <div class="footer-col">
      <h2>Inmobiliaria <span>Mi Dulce Hogar</span></h2>
      <p>Encuentra la propiedad ideal con nosotros.</p>
    </div>

    <div class="footer-col">
      <h3>Enlaces</h3>
      <a href="index.html">Propiedades</a>
      <a href="servicios.html">Servicios</a>
      <a href="calculadora.html">Calculadora</a>
    </div>

    <div class="footer-col">
      <h3>Contacto</h3>
      <p>📱 444 491 7754</p>
<p>📱81 2432 0438</p>
      <p>📍 Ciudad Valles, S.L.P.</p>
    </div>

  </div>

  <div class="footer-bottom">
    © 2026 Mi Dulce Hogar
  </div>

</div>

<script>
function toggleMenu(){
  menu.classList.toggle("active");
  overlay.classList.toggle("active");
}
</script>



</body>
</html>
