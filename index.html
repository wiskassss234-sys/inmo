<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INMO | Propiedades Premium</title>

<style>
:root{
  --azul:#0b3c5d;
  --dorado:#c9a227;
}

/* GENERAL */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f4f4f4;
}

/* HEADER */
header{
  background:rgba(11,60,93,0.95);
  color:#fff;
  padding:1rem;
  text-align:center;
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
  z-index:1000;
}

/* HERO */
.hero{
  background:linear-gradient(rgba(11,60,93,0.7),rgba(0,0,0,0.7)),
  url('fondo.png') center/cover no-repeat;
  color:#fff;
  text-align:center;
  padding:5rem 2rem;
  animation: zoom 20s infinite alternate;
}

@keyframes zoom{
  from{background-size:100%;}
  to{background-size:110%;}
}

.hero h2{
  font-size:2.5rem;
  margin-bottom:1rem;
}

/* GLASS BOX */
.glass{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:15px;
  display:inline-block;
}

/* BUSCADOR */
.buscador{
  padding:12px;
  width:250px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* FILTROS */
select{
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
  padding:30px;
}

.card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* IMAGEN */
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CONTENIDO */
.card-content{
  padding:15px;
}

.precio{
  color:var(--rojo);
  font-weight:bold;
  font-size:1.3rem;
}

/* BOTON */
.btn{
  display:block;
  background:linear-gradient(45deg,var(--azul),var(--dorado));
  color:#fff;
  text-align:center;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  margin-top:10px;
  transition:0.3s;
}

.btn:hover{
  opacity:0.85;
}
</style>
</head>

<body>

<header>
<h1>INMO</h1>
</header>

<section class="hero">
<h2>Encuentra tu propiedad ideal</h2>

<div class="glass">
<input id="buscador" class="buscador" placeholder="Buscar propiedad...">

<select id="tipo">
<option value="">Tipo</option>
<option value="terreno">Terreno</option>
<option value="bodega">Bodega</option>
</select>
</div>

</section>

<section>
<div class="cards" id="contenedor"></div>
</section>

<script src="propiedades.js"></script>

<script>
const contenedor = document.getElementById("contenedor");
const buscador = document.getElementById("buscador");
const tipo = document.getElementById("tipo");

function mostrar(lista){
  contenedor.innerHTML = "";

  lista.forEach(p => {
    contenedor.innerHTML += `
      <div class="card">
        <img src="${p.imagenes[0]}">
        <div class="card-content">
          <p class="precio">${p.precio}</p>
          <p><strong>${p.nombre}</strong></p>
          <p>${p.ubicacion}</p>
          <p>${p.terreno}</p>
          <a href="https://wa.me/4444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Más info</a>
        </div>
      </div>
    `;
  });
}

function filtrar(){
  let texto = buscador.value.toLowerCase();
  let tipoSeleccionado = tipo.value;

  let filtradas = propiedades.filter(p => {
    let coincideTexto =
      p.nombre.toLowerCase().includes(texto) ||
      p.ubicacion.toLowerCase().includes(texto);

    let coincideTipo = tipoSeleccionado === "" || p.tipo === tipoSeleccionado;

    return coincideTexto && coincideTipo;
  });

  mostrar(filtradas);
}

buscador.addEventListener("input", filtrar);
tipo.addEventListener("change", filtrar);

mostrar(propiedades);
</script>

</body>
</html>
