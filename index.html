<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-weight:700;
  cursor:pointer;
}

.logo span{
  color:var(--primary);
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  padding:30px 20px;
  transition:.3s;
  z-index:200;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.menu.active{
  right:0;
}

.menu a{
  text-decoration:none;
  color:#111;
  font-size:18px;
}

.contacto{
  margin-top:20px;
  background:var(--primary);
  color:#fff !important;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:150;
}

.overlay.active{
  opacity:1;
  pointer-events:all;
}

/* HERO */
.hero{
  height:350px;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  position:relative;
  text-align:center;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero h1,
.hero p,
.hero a{
  position:relative;
  z-index:2;
}

.hero a{
  margin-top:15px;
  background:var(--primary);
  padding:10px 20px;
  border-radius:10px;
  color:#fff;
  text-decoration:none;
}

/* BUSCADOR */
.search-box{
  background:#fff;
  margin:-40px auto 20px;
  padding:20px;
  border-radius:15px;
  max-width:800px;
}

/* CONTENIDO */
.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

.img-box img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.info{
  padding:15px;
}

.precio{
  color:var(--primary);
  font-weight:700;
}

/* SERVICIOS */
.servicios-grid{
  display:grid;
  gap:20px;
}

.servicio{
  background:#fff;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.icon{
  font-size:30px;
}

/* CALCULADORA */
.calc-box{
  background:#fff;
  padding:25px;
  border-radius:20px;
  max-width:500px;
  margin:auto;
}

.calc-box input{
  width:100%;
  padding:12px;
  margin-top:10px;
}

.calc-box button{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
}

#resultado{
  text-align:center;
  font-size:25px;
  color:var(--primary);
}

/* FOOTER */
.footer{
  background:#0f172a;
  color:#fff;
  padding:30px;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="irA('inicio')">
    Inmobiliaria <span>Mi Dulce Hogar</span>
  </div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="menu">
  <a onclick="irA('inicio')">Inicio</a>
  <a onclick="irA('propiedades')">Propiedades</a>
  <a onclick="irA('servicios')">Servicios</a>
  <a onclick="irA('calculadora')">Calculadora</a>
</div>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div class="hero" id="inicio">
  <h1>Encuentra tu propiedad ideal</h1>
  <a href="#propiedades">Explorar</a>
</div>

<div class="search-box">
  <input id="busqueda" placeholder="Buscar...">
</div>

<div class="container" id="propiedades">
  <div id="contenedor" class="cards"></div>
</div>

<div id="servicios" class="container">
  <h2>Servicios</h2>
  <div class="servicios-grid">
    <div class="servicio">
      <div class="icon">🏡</div>
      <h3>Compra</h3>
      <p>Te ayudamos a encontrar la mejor opción</p>
    </div>
    <div class="servicio">
      <div class="icon">💰</div>
      <h3>Venta</h3>
      <p>Vendemos tu propiedad rápido</p>
    </div>
  </div>
</div>

<div id="calculadora" class="container">
  <h2>Calculadora</h2>
  <div class="calc-box">
    <input id="precio" value="3000000">
    <input id="enganche" value="20">
    <input id="interes" value="9">
    <input id="anos" value="20">
    <button onclick="calcular()">Calcular</button>
    <h3 id="resultado">$0</h3>
  </div>
</div>

<div class="footer">
  Mi Dulce Hogar
</div>

<script>
function toggleMenu(){
  menu.classList.toggle("active");
  overlay.classList.toggle("active");
}

function irA(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
  toggleMenu();
}

function calcular(){
  let p=precio.value;
  let e=enganche.value/100;
  let i=interes.value/100/12;
  let n=anos.value*12;

  let m=p*(1-e);
  let pago=m*(i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);

  resultado.innerText="$"+pago.toFixed(0);
}
</script>

</body>
</html>
