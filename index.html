<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar | Plataforma</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{
  --primary:#3b82f6;
  --bg:#f1f5f9;
  --text:#1e293b;
  --sub:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);} 

.header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#fff;border-bottom:1px solid var(--border);} 
.logo{font-weight:700;color:var(--primary);} 

.container{max-width:1200px;margin:auto;padding:20px;} 

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px;} 

.card{cursor:pointer;} 
.img-box{border-radius:16px;overflow:hidden;} 
.img-box img{width:100%;height:220px;object-fit:cover;} 

.card-content{margin-top:10px;} 
.price{font-weight:700;} 
.sub{color:var(--sub);font-size:13px;} 

.btn{display:block;margin-top:10px;background:var(--primary);color:#fff;padding:10px;text-align:center;border-radius:10px;text-decoration:none;} 

/* PAGINA INDIVIDUAL */
.detalle{
  display:none;
}

.detalle.active{display:block;} 

.galeria{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
}

.galeria img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

.info-detalle{
  margin-top:20px;
  background:#fff;
  padding:20px;
  border-radius:16px;
}

.volver{
  margin-bottom:15px;
  cursor:pointer;
  color:var(--primary);
}

</style></head><body><div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div><div class="container" id="listado">
  <div class="cards" id="contenedor"></div>
</div><div class="container detalle" id="detalle"></div><script src="propiedades.js"></script><script>
const contenedor=document.getElementById("contenedor");
const detalle=document.getElementById("detalle");
const listado=document.getElementById("listado");

function mostrar(){
  contenedor.innerHTML="";
  propiedades.forEach((p,i)=>{
    contenedor.innerHTML+=`
    <div class="card" onclick="verDetalle(${i})">
      <div class="img-box">
        <img src="${p.imagenes[0]}">
      </div>
      <div class="card-content">
        <div class="price">${p.precio}</div>
        <div>${p.nombre}</div>
        <div class="sub">${p.ubicacion}</div>
      </div>
    </div>`;
  });
}

function verDetalle(i){
  const p=propiedades[i];
  listado.style.display="none";
  detalle.classList.add("active");

  detalle.innerHTML=`
    <div class="volver" onclick="regresar()">← Volver</div>

    <div class="galeria">
      <img src="${p.imagenes[0]}">
      <div>
        ${(p.imagenes.slice(1,5).map(img=>`<img src="${img}" style="margin-bottom:10px;">`).join(''))}
      </div>
    </div>

    <div class="info-detalle">
      <h2>${p.nombre}</h2>
      <p><strong>${p.precio}</strong></p>
      <p>${p.ubicacion}</p>
      <p>${p.terreno}</p>
      ${p.extra?`<ul>${p.extra.map(e=>`<li>${e}</li>`).join('')}</ul>`:''}
      <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
    </div>
  `;
}

function regresar(){
  detalle.classList.remove("active");
  listado.style.display="block";
}

mostrar();
</script></body>
</html>
