<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{
  --primary:#2563eb;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --sub:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box;transition:.2s ease;}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  background:#fff;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.logo{font-weight:700;}
.menu{font-size:14px;color:var(--sub);}

.container{
  display:flex;
  max-width:1300px;
  margin:auto;
  padding:30px;
  gap:25px;
}

.sidebar{
  width:260px;
  background:#fff;
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
}

.sidebar input,.sidebar select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
}

.content{flex:1;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.slider{height:180px;position:relative;}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
}

.slide.active{opacity:1;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#ef4444;
  color:#fff;
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
}

.card-content{padding:15px;}

.precio{
  font-size:1.4rem;
  font-weight:700;
}

.ubicacion{
  font-size:13px;
  color:var(--sub);
}

.info{
  display:flex;
  gap:15px;
  font-size:13px;
  color:var(--sub);
  margin-top:8px;
}

.btn{
  display:block;
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:10px;
  border-radius:10px;
  margin-top:12px;
  text-decoration:none;
  font-size:14px;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:90%;
  max-width:500px;
  border-radius:16px;
  padding:20px;
}

@media(max-width:900px){
  .container{flex-direction:column;}
  .sidebar{width:100%;}
}
</style></head><body><div class="header">
  <div class="logo">Mi Dulce Hogar</div>
  <div class="menu">Comprar · Rentar · Contacto</div>
</div><div class="container"><div class="sidebar">
  <input id="buscador" placeholder="Buscar...">
  <select id="tipo">
    <option value="">Tipo</option>
    <option value="casa">Casa</option>
    <option value="terreno">Terreno</option>
    <option value="bodega">Bodega</option>
  </select>
</div><div class="content">
  <div class="cards" id="contenedor"></div>
</div></div><div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div><script src="propiedades.js"></script><script>
const contenedor=document.getElementById("contenedor");
const buscador=document.getElementById("buscador");
const tipo=document.getElementById("tipo");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

function mostrar(lista){
  contenedor.innerHTML="";
  lista.forEach(p=>{
    contenedor.innerHTML+=`
    <div class="card" onclick='abrirModal(${JSON.stringify(p)})'>
      <div class="slider">
        ${p.destacado?'<span class="badge">Destacado</span>':''}
        ${p.imagenes.map((img,i)=>`<img src="${img}" class="slide ${i===0?'active':''}">`).join('')}
      </div>
      <div class="card-content">
        <div class="precio">${p.precio}</div>
        <div>${p.nombre}</div>
        <div class="ubicacion">📍 ${p.ubicacion}</div>
        <div class="info">
          <span>📐 ${p.terreno}</span>
        </div>
        <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
      </div>
    </div>`;
  });
}

function filtrar(){
  const texto=buscador.value.toLowerCase();
  const tipoSel=tipo.value;

  const filtradas=propiedades.filter(p=>{
    return (
      (p.nombre.toLowerCase().includes(texto) || p.ubicacion.toLowerCase().includes(texto)) &&
      (tipoSel==="" || p.tipo===tipoSel)
    );
  });

  mostrar(filtradas);
}

buscador.addEventListener("input",filtrar);
tipo.addEventListener("change",filtrar);

function abrirModal(p){
  modal.style.display="flex";
  modalContent.innerHTML=`
    <h2>${p.nombre}</h2>
    <p><strong>${p.precio}</strong></p>
    <p>${p.ubicacion}</p>
    <p>${p.terreno}</p>
    <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
  `;
}

modal.onclick=()=>modal.style.display="none";

mostrar(propiedades);
</script></body>
</html>
