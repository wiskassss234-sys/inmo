<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#f1f5f9;
}

/* HEADER */
.header{
  background:#fff;
  padding:15px 20px;
  border-bottom:1px solid #ddd;
}

.logo{
  font-weight:700;
}

/* HERO */
.hero{
  height:350px;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero h1{
  position:relative;
}

/* BUSCADOR */
.search-box{
  background:#fff;
  margin:-40px auto 20px;
  padding:20px;
  border-radius:15px;
  max-width:800px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.search-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* CONTENIDO */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGEN */
.img-box{
  position:relative;
}

.img-box img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

/* FLECHAS */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  padding:5px 10px;
  border-radius:50%;
  cursor:pointer;
}

.nav.left{left:10px;}
.nav.right{right:10px;}

/* INFO */
.info{
  padding:18px;
}

.zona{
  font-size:13px;
  color:#64748b;
}

.titulo{
  font-size:18px;
  font-weight:700;
  margin:5px 0 10px;
}

.datos{
  display:flex;
  gap:15px;
  font-size:14px;
  color:#475569;
  margin-bottom:10px;
}

.precio{
  font-size:22px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:10px;
}

/* BOTÓN */
.btn{
  display:block;
  background:var(--primary);
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
}

/* FOOTER */
.footer{
  background:#0f172a;
  color:#fff;
  padding:30px;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div>

<div class="hero">
  <h1>Encuentra tu propiedad ideal</h1>
</div>

<div class="search-box">
  <input id="busqueda" placeholder="Buscar ubicación...">
</div>

<div class="container">
  <div class="cards" id="contenedor"></div>
</div>

<div class="footer">
  Mi Dulce Hogar
</div>

<script src="propiedades.js"></script>

<script>
const contenedor=document.getElementById("contenedor");
const busqueda=document.getElementById("busqueda");

let listaActual=[];
const state={};

function mostrar(lista){
  listaActual=lista;
  contenedor.innerHTML="";

  if(lista.length===0){
    contenedor.innerHTML="<p>No hay propiedades</p>";
    return;
  }

  lista.forEach((p,i)=>{
    state[i]={index:0};

    contenedor.innerHTML+=`
    <div class="card">

      <div class="img-box">
        <img id="img-${i}" src="${p.imagenes[0]}">

        <div class="badge">Venta</div>

        <div class="nav left" onclick="prev(${i})">❮</div>
        <div class="nav right" onclick="next(${i})">❯</div>
      </div>

      <div class="info">
        <div class="zona">${p.zona || p.ubicacion}</div>

        <div class="titulo">${p.nombre}</div>

        <div class="datos">
          ${p.habitaciones ? `🛏️ ${p.habitaciones}` : ''}
          ${p.banos ? `🛁 ${p.banos}` : ''}
          ${p.metros ? `📐 ${p.metros}` : ''}
        </div>

        <div class="precio">${p.precio}</div>

        <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp || '')}" class="btn">
          Contactar
        </a>
      </div>

    </div>`;
  });
}

function updateSlider(i){
  const p=listaActual[i];
  const idx=state[i].index;
  document.getElementById(`img-${i}`).src=p.imagenes[idx];
}

function next(i){
  const p=listaActual[i];
  state[i].index=(state[i].index+1)%p.imagenes.length;
  updateSlider(i);
}

function prev(i){
  const p=listaActual[i];
  state[i].index--;
  if(state[i].index<0) state[i].index=p.imagenes.length-1;
  updateSlider(i);
}

busqueda.addEventListener("input",()=>{
  const val=busqueda.value.toLowerCase();
  const filtradas=propiedades.filter(p=>p.ubicacion.toLowerCase().includes(val));
  mostrar(filtradas);
});

mostrar(propiedades);
</script>

</body>
</html>
