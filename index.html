<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar | Inmobiliaria</title><style>
:root{--azul:#0b3c5d;--rojo:#e63946;}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#e9ecef;
}

.header{
  background:#0b3c5d;
  padding:15px;
  color:#fff;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
}

.hero{
  text-align:center;
  padding:20px;
}

.buscador, select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.seccion-propiedades{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.slider{
  position:relative;
  height:200px;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:.5s;
}

.slide.active{opacity:1;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#e63946;
  color:#fff;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.card-content{
  padding:15px;
}

.precio{
  font-size:1.8rem;
  color:var(--rojo);
  font-weight:bold;
}

h3{margin:5px 0;}

.ubicacion{color:#666;font-size:14px;}
.detalle{font-size:14px;}

.btn{
  display:block;
  background:#0b3c5d;
  color:#fff;
  text-align:center;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  text-decoration:none;
}

</style></head><body><div class="header">Mi Dulce Hogar</div><section class="hero">
<input id="buscador" class="buscador" placeholder="Buscar...">
<select id="tipo">
<option value="">Tipo</option>
<option value="casa">Casa</option>
<option value="terreno">Terreno</option>
<option value="bodega">Bodega</option>
</select>
</section><section class="seccion-propiedades">
<div class="cards" id="contenedor"></div>
</section><script src="propiedades.js"></script><script>
const contenedor = document.getElementById("contenedor");

function mostrar(lista){
  contenedor.innerHTML="";
  lista.forEach(p=>{
    contenedor.innerHTML+=`
    <div class="card">
      <div class="slider">
        ${p.destacado ? '<span class="badge">Destacado</span>' : ''}
        ${p.imagenes.map((img,i)=>`<img src="${img}" class="slide ${i===0?'active':''}">`).join('')}
      </div>
      <div class="card-content">
        <p class="precio">${p.precio}</p>
        <h3>${p.nombre}</h3>
        <p class="ubicacion">${p.ubicacion}</p>
        <p class="detalle">${p.terreno}</p>
        <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">WhatsApp</a>
      </div>
    </div>`;
  });
}

mostrar(propiedades);
</script></body>
</html>
