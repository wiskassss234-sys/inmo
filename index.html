<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INMO | Propiedades</title>

<style>
:root{
  --azul:#0b3c5d;
  --dorado:#c9a227;
}

/* GENERAL */
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

/* HEADER */
header{
  background:var(--azul);
  color:#fff;
  padding:1rem;
  text-align:center;
}

/* HERO */
.hero{
  background:linear-gradient(rgba(11,60,93,0.7),rgba(0,0,0,0.7)),
  url('fondo.png') center/cover no-repeat;
  color:#fff;
  text-align:center;
  padding:4rem 2rem;
}

.hero h2{
  font-size:2rem;
  margin-bottom:1rem;
}

/* BUSCADOR */
.buscador{
  padding:12px;
  width:80%;
  max-width:400px;
  border-radius:10px;
  border:none;
}

/* FILTROS */
.filtros{
  margin-top:10px;
}

.filtros select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGEN */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTENIDO */
.card-content{
  padding:15px;
}

.precio{
  color:red;
  font-weight:bold;
  font-size:1.2rem;
}

.btn{
  display:block;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>INMO</h1>
</header>

<section class="hero">
<h2>Encuentra tu propiedad ideal</h2>

<input id="buscador" class="buscador" placeholder="Buscar por ubicación o nombre">

<div class="filtros">
<select id="tipo">
<option value="">Tipo</option>
<option value="terreno">Terreno</option>
<option value="bodega">Bodega</option>
</select>
</div>
</section>

<section>
<div class="cards" id="contenedor"></div>
</section>

<!-- 🔥 DATOS -->
<script src="propiedades.js"></script>

<!-- 🔥 SCRIPT -->
<script>
const contenedor = document.getElementById("contenedor");
const buscador = document.getElementById("buscador");
const tipo = document.getElementById("tipo");

function mostrar(lista){
  contenedor.innerHTML = "";

  lista.forEach(p => {
    contenedor.innerHTML += `
      <div class="card">
        <img src="${p.imagenes[0]}">
        <div class="card-content">
          <p class="precio">${p.precio}</p>
          <p><strong>${p.nombre}</strong></p>
          <p>${p.ubicacion}</p>
          <p>${p.terreno}</p>
          <a href="https://wa.me/4444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Más info</a>
        </div>
      </div>
    `;
  });
}

function filtrar(){
  let texto = buscador.value.toLowerCase();
  let tipoSeleccionado = tipo.value;

  let filtradas = propiedades.filter(p => {

    let coincideTexto =
      p.nombre.toLowerCase().includes(texto) ||
      p.ubicacion.toLowerCase().includes(texto);

    let coincideTipo = tipoSeleccionado === "" || p.tipo === tipoSeleccionado;

    return coincideTexto && coincideTipo;
  });

  mostrar(filtradas);
}

buscador.addEventListener("input", filtrar);
tipo.addEventListener("change", filtrar);

mostrar(propiedades);
</script>

</body>
</html>
