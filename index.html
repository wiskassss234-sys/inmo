<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  transition: all .2s ease;
}

body{
  background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
}

/* HEADER */
.header{
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top:0;
  z-index:100;
  padding:15px 20px;
  border-bottom:1px solid #ddd;
}

.logo{
  font-weight:700;
}

/* HERO */
.hero{
  height:350px;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  position:relative;
  text-align:center;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;
  left:0;
}

.hero h1{
  position:relative;
  z-index:2;
}

.hero p{
  position:relative;
  z-index:2;
  margin-top:10px;
}

.hero a{
  position:relative;
  z-index:2;
  margin-top:15px;
  background:#2563eb;
  padding:10px 20px;
  border-radius:10px;
  color:#fff;
  text-decoration:none;
}

/* BUSCADOR */
.search-box{
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  margin:-40px auto 20px;
  padding:20px;
  border-radius:15px;
  max-width:800px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  border:1px solid rgba(255,255,255,0.3);
  position:relative;
  z-index:10;
}

.search-box input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
}

.search-box input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

/* CONTENIDO */
.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px 80px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.95);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  backdrop-filter: blur(4px);
}

.card:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

/* IMAGEN */
.img-box{
  position:relative;
}

.img-box img{
  width:100%;
  height:220px;
  object-fit:cover;
  transition: transform .4s ease;
}

.card:hover .img-box img{
  transform: scale(1.05);
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#22c55e;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:10px;
  left:10px;
  background:#fff;
  border-radius:50%;
  padding:6px;
  cursor:pointer;
}

/* INFO */
.info{
  padding:20px;
}

.zona{
  font-size:13px;
  color:#64748b;
}

.titulo{
  font-size:18px;
  font-weight:700;
  margin:8px 0 12px;
}

.desc{
  font-size:14px;
  color:#555;
  margin-bottom:14px;
  line-height:1.6;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.datos{
  display:flex;
  gap:15px;
  font-size:14px;
  color:#475569;
  margin-bottom:12px;
}

.precio{
  font-size:22px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:12px;
}

/* BOTÓN */
.btn{
  display:block;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
}

.btn:hover{
  transform:scale(1.03);
}

.btn:active{
  transform:scale(0.97);
}

/* FOOTER */
.footer{
  background:#0f172a;
  color:#fff;
  padding:40px 30px;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div>

<div class="hero">
  <h1>Encuentra tu propiedad ideal</h1>
  <p>Casas, terrenos y más en la Huasteca</p>
  <a href="#contenedor">Ver propiedades</a>
</div>

<div class="search-box">
  <input id="busqueda" placeholder="Buscar ubicación, zona o nombre...">
</div>

<div class="container">
  <div class="cards" id="contenedor"></div>
</div>

<div class="footer">
  Mi Dulce Hogar
</div>

<script src="propiedades.js"></script>

<script>
const contenedor=document.getElementById("contenedor");
const busqueda=document.getElementById("busqueda");

let listaActual=[];

function mostrar(lista){
  listaActual=lista;
  contenedor.innerHTML="";

  if(lista.length===0){
    contenedor.innerHTML="<p>No hay propiedades</p>";
    return;
  }

  lista.forEach((p,i)=>{
    contenedor.innerHTML+=`
    <div class="card">

      <div class="img-box">
        <img src="${p.imagenes[0]}">

        <div class="badge">Venta</div>
        <div class="fav">❤️</div>
      </div>

      <div class="info">
        <div class="zona">${p.zona || p.ubicacion}</div>

        <div class="titulo">${p.nombre}</div>

        <div class="desc">${p.descripcion || ""}</div>

        <div class="datos">
          ${p.habitaciones ? `🛏️ ${p.habitaciones}` : ''}
          ${p.banos ? `🛁 ${p.banos}` : ''}
          ${p.metros ? `📐 ${p.metros}` : ''}
        </div>

        <div class="precio">${p.precio}</div>

        <a href="https://wa.me/524444917754?text=${encodeURIComponent(
          p.whatsapp || `Hola, me interesa la propiedad: ${p.nombre}`
        )}" class="btn">
          Contactar
        </a>
      </div>

    </div>`;
  });
}

busqueda.addEventListener("input",()=>{
  const val=busqueda.value.toLowerCase();

  const filtradas = propiedades.filter(p =>
    (p.ubicacion && p.ubicacion.toLowerCase().includes(val)) ||
    (p.zona && p.zona.toLowerCase().includes(val)) ||
    (p.nombre && p.nombre.toLowerCase().includes(val))
  );

  mostrar(filtradas);
});

mostrar(propiedades);
</script>

</body>
</html>
