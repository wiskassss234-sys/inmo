<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{
  --primary:#2563eb;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --sub:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box;transition:.25s ease;}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  background:#fff;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.logo{font-weight:700;}

/* HERO */
.hero{
  padding:40px 30px;
}

.hero-box{
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  align-items:center;
}

.hero-box input,.hero-box select{
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  flex:1;
}

/* GRID PRINCIPAL */
.main{
  max-width:1300px;
  margin:auto;
  padding:30px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:30px;
}

/* CARD MODERNA */
.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  cursor:pointer;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 50px rgba(0,0,0,0.12);
}

.slider{
  height:260px;
  overflow:hidden;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:hover img{
  transform:scale(1.08);
}

.card-content{
  padding:20px;
}

.precio{
  font-size:1.6rem;
  font-weight:700;
}

.titulo{
  font-weight:600;
  margin:8px 0;
}

.ubicacion{
  color:var(--sub);
  font-size:13px;
}

.info{
  display:flex;
  gap:15px;
  margin-top:10px;
  font-size:13px;
  color:var(--sub);
}

.btn{
  display:block;
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:12px;
  border-radius:10px;
  margin-top:15px;
  text-decoration:none;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:90%;
  max-width:600px;
  border-radius:20px;
  padding:25px;
}

</style></head><body><div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div><section class="hero">
  <div class="hero-box">
    <input id="buscador" placeholder="Buscar ubicación o propiedad...">
    <select id="tipo">
      <option value="">Tipo</option>
      <option value="casa">Casa</option>
      <option value="terreno">Terreno</option>
      <option value="bodega">Bodega</option>
    </select>
  </div>
</section><section class="main">
  <div class="cards" id="contenedor"></div>
</section><div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div><script src="propiedades.js"></script><script>
const contenedor=document.getElementById("contenedor");
const buscador=document.getElementById("buscador");
const tipo=document.getElementById("tipo");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

function mostrar(lista){
  contenedor.innerHTML="";
  lista.forEach(p=>{
    contenedor.innerHTML+=`
    <div class="card" onclick='abrirModal(${JSON.stringify(p)})'>
      <div class="slider">
        <img src="${p.imagenes[0]}">
      </div>
      <div class="card-content">
        <div class="precio">${p.precio}</div>
        <div class="titulo">${p.nombre}</div>
        <div class="ubicacion">📍 ${p.ubicacion}</div>
        <div class="info">📐 ${p.terreno}</div>
        <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
      </div>
    </div>`;
  });
}

function filtrar(){
  const texto=buscador.value.toLowerCase();
  const tipoSel=tipo.value;

  const filtradas=propiedades.filter(p=>{
    return (
      (p.nombre.toLowerCase().includes(texto) || p.ubicacion.toLowerCase().includes(texto)) &&
      (tipoSel==="" || p.tipo===tipoSel)
    );
  });

  mostrar(filtradas);
}

buscador.addEventListener("input",filtrar);
tipo.addEventListener("change",filtrar);

function abrirModal(p){
  modal.style.display="flex";
  modalContent.innerHTML=`
    <h2>${p.nombre}</h2>
    <p><strong>${p.precio}</strong></p>
    <p>${p.ubicacion}</p>
    <p>${p.terreno}</p>
    <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
  `;
}

modal.onclick=()=>modal.style.display="none";

mostrar(propiedades);
</script></body>
</html>
