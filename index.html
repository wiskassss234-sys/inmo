<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f1f5f9;}

.header{
  background:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}
.logo{font-weight:700;font-size:18px;}

/* HERO */
.hero{
  height:420px;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.hero::before{
  content:"";
  position:absolute;
  width:100%;height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.3));
}
.hero-content{
  position:relative;
  color:#fff;
  text-align:center;
  max-width:600px;
}
.hero-content h1{
  font-size:40px;
  font-weight:700;
}
.hero-content p{margin:15px 0;font-size:18px;}
.btn-main{
  background:var(--primary);
  padding:14px 28px;
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
}
.btn-main:hover{background:var(--primary-dark);}

/* SEARCH */
.search-box{
  background:#fff;
  margin:-50px auto 20px;
  padding:20px;
  border-radius:20px;
  max-width:900px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  display:grid;
  gap:10px;
}
.search-box input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* CONTENT */
.container{max-width:1200px;margin:auto;padding:40px 20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;}

/* CARD PRO */
.card{
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
  transition:.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 60px rgba(0,0,0,0.2);
}

.slider{position:relative;}
.slider img{
  width:100%;
  height:230px;
  object-fit:cover;
}

/* overlay elegante */
.overlay-info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  color:#fff;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.price{
  font-size:22px;
  font-weight:700;
  color:#60a5fa;
}

.badge{
  position:absolute;
  top:12px;
  right:12px;
  background:#fff;
  color:#000;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  padding:5px 10px;
  border-radius:50%;
  cursor:pointer;
}
.nav.left{left:10px;}
.nav.right{right:10px;}

.card-content{padding:15px;}

.btn{
  display:block;
  margin-top:12px;
  background:var(--primary);
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  font-weight:600;
  transition:.3s;
}
.btn:hover{background:var(--primary-dark);}

.footer{
  background:#0f172a;
  color:#fff;
  padding:40px 20px;
  margin-top:40px;
}
</style></head><body><div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div><div class="hero">
  <div class="hero-content">
    <h1>Encuentra la propiedad de tus sueños</h1>
    <p>Casas y terrenos en las mejores zonas</p>
    <a href="#" class="btn-main">Explorar propiedades</a>
  </div>
</div><div class="search-box">
  <input id="busqueda" placeholder="Buscar ubicación...">
</div><div class="container">
  <div class="cards" id="contenedor"></div>
</div><div class="footer">
  <h3>Mi Dulce Hogar</h3>
  <p>Especialistas en bienes raíces</p>
</div><script src="propiedades.js"></script><script>
const contenedor=document.getElementById("contenedor");
const busqueda=document.getElementById("busqueda");

let listaActual=[];
const state={};

function mostrar(lista){
 listaActual=lista;
 contenedor.innerHTML="";
 if(lista.length===0){contenedor.innerHTML="<p>No hay propiedades</p>";return;}

 lista.forEach((p,i)=>{
  state[i]={index:0};

  contenedor.innerHTML+=`
  <div class="card">
    <div class="slider">
      <img id="img-${i}" src="${p.imagenes[0]}">
      <div class="badge">Venta</div>
      <div class="overlay-info">
        <div class="price">${p.precio}</div>
        <div>${p.nombre}</div>
        <div style="font-size:13px;opacity:0.8">${p.ubicacion}</div>
      </div>
      <div class="nav left" onclick="prev(${i})">❮</div>
      <div class="nav right" onclick="next(${i})">❯</div>
    </div>

    <div class="card-content">
      <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp || '')}" class="btn">Contactar</a>
    </div>
  </div>`;
 });
}

function updateSlider(i){
 const p=listaActual[i];
 const idx=state[i].index;
 document.getElementById(`img-${i}`).src=p.imagenes[idx];
}

function next(i){
 const p=listaActual[i];
 state[i].index=(state[i].index+1)%p.imagenes.length;
 updateSlider(i);
}

function prev(i){
 const p=listaActual[i];
 state[i].index--;
 if(state[i].index<0) state[i].index=p.imagenes.length-1;
 updateSlider(i);
}

busqueda.addEventListener("input",()=>{
 const val=busqueda.value.toLowerCase();
 const filtradas=propiedades.filter(p=>p.ubicacion.toLowerCase().includes(val));
 mostrar(filtradas);
});

mostrar(propiedades);
</script></body>
</html>
