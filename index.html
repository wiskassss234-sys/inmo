<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propiedades</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{--primary:#2563eb;}
body{font-family:Inter;background:#f1f5f9;margin:0}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;background:#fff;
}
.logo span{color:var(--primary)}
.menu-btn{font-size:24px;cursor:pointer}

/* MENU */
.menu{
position:fixed;top:0;right:-100%;
width:80%;height:100%;background:#fff;
padding:30px;transition:.3s;
display:flex;flex-direction:column;gap:20px;
}
.menu.active{right:0}

/* HERO */
.hero{
height:250px;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
display:flex;align-items:center;justify-content:center;color:#fff;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:20px;
}
.card{background:#fff;border-radius:15px;overflow:hidden}
.card img{width:100%;height:180px;object-fit:cover}
.info{padding:10px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Inmobiliaria <span>Mi Dulce Hogar</span></div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div id="menu" class="menu">
  <a href="index.html">Propiedades</a>
  <a href="servicios.html">Servicios</a>
  <a href="calculadora.html">Calculadora</a>
</div>

<div class="hero">
  <h1>Propiedades</h1>
</div>

<div id="contenedor" class="cards"></div>

<script src="propiedades.js"></script>

<script>
function toggleMenu(){
  menu.classList.toggle("active");
}

const contenedor=document.getElementById("contenedor");

function mostrar(lista){
  contenedor.innerHTML="";
  lista.forEach(p=>{
    contenedor.innerHTML+=`
    <div class="card">
      <img src="${p.imagenes[0]}">
      <div class="info">
        <h3>${p.nombre}</h3>
        <p>${p.precio}</p>
      </div>
    </div>`;
  });
}

mostrar(propiedades);
</script>

</body>
</html>
