<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar | Inmobiliaria</title>

<style>
:root{
  --azul:#0b3c5d;
  --dorado:#c9a227;
  --rojo:#e63946;
}

/* GENERAL */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f4f4f4;
}

/* HEADER PRO */
.header{
  background:linear-gradient(90deg,#0b3c5d,#092b44);
  padding:10px 20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* LOGO */
.logo{
  height:50px;
  border-radius:8px;
}

/* TITULO */
.titulo{
  flex:1;
  text-align:center;
  font-size:1.8rem;
  font-weight:700;
  letter-spacing:3px;
  background:linear-gradient(45deg,#fff,#c9a227);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HERO */
.hero{
  background:linear-gradient(rgba(11,60,93,0.7),rgba(0,0,0,0.7)),
  url('fondo.png') center/cover no-repeat;
  color:#fff;
  text-align:center;
  padding:5rem 2rem;
}

/* BUSCADOR */
.buscador, select{
  padding:12px;
  width:250px;
  border-radius:10px;
  border:none;
  margin:5px;
}

/* SECCIÓN PROPIEDADES */
.seccion-propiedades{
  background:linear-gradient(180deg,#f4f4f4,#e0e0e0);
  padding:50px 0;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
  padding:0 30px;
}

.card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:220px;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 0.5s ease;
}

.slide.active{
  opacity:1;
}

/* BOTONES */
.prev, .next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  border-radius:8px;
}

.prev{ left:10px; }
.next{ right:10px; }

/* CONTENIDO */
.card-content{
  padding:15px;
}

.precio{
  color:var(--rojo);
  font-weight:bold;
  font-size:1.5rem;
}

.btn{
  display:block;
  background:linear-gradient(45deg,var(--azul),var(--dorado));
  color:#fff;
  text-align:center;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  margin-top:10px;
}

/* EXTRAS */
.card-content ul{
  padding-left:15px;
  margin:5px 0;
  font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-content">
    <img src="logo.jpg" class="logo">
    <h1 class="titulo">Inmobiliaria Mi Dulce Hogar</h1>
  </div>
</header>

<!-- HERO -->
<section class="hero">
<h2>Encuentra tu propiedad ideal</h2>

<input id="buscador" class="buscador" placeholder="Buscar propiedad...">

<select id="tipo">
<option value="">Tipo</option>
<option value="terreno">Terreno</option>
<option value="bodega">Bodega</option>
<option value="casa">Casa</option>
</select>
</section>

<!-- PROPIEDADES -->
<section class="seccion-propiedades">
  <div class="cards" id="contenedor"></div>
</section>

<script src="propiedades.js"></script>

<script>
const contenedor = document.getElementById("contenedor");
const buscador = document.getElementById("buscador");
const tipo = document.getElementById("tipo");

function mostrar(lista){
  contenedor.innerHTML = "";

  lista.forEach(p => {
    contenedor.innerHTML += `
      <div class="card">
        
        <div class="slider">
          ${(p.imagenes && p.imagenes.length ? p.imagenes : ["https://via.placeholder.com/400"]).map((img,i)=>`
            <img src="${img}" class="slide ${i===0 ? 'active' : ''}">
          `).join('')}

          <button class="prev">‹</button>
          <button class="next">›</button>
        </div>

        <div class="card-content">
          <p class="precio">${p.precio}</p>
          <p><strong>${p.nombre}</strong></p>
          <p>${p.ubicacion}</p>
          <p>${p.terreno}</p>

          ${p.extra ? `<ul>${p.extra.map(e=>`<li>${e}</li>`).join("")}</ul>` : ""}

          <a href="https://wa.me/4444917754?text=${encodeURIComponent(p.whatsapp)}" 
             class="btn" target="_blank">Más info</a>
        </div>
      </div>
    `;
  });
}

function filtrar(){
  let texto = buscador.value.toLowerCase();
  let tipoSeleccionado = tipo.value;

  let filtradas = propiedades.filter(p => {
    let coincideTexto =
      (p.nombre || '').toLowerCase().includes(texto) ||
      (p.ubicacion || '').toLowerCase().includes(texto);

    let coincideTipo = tipoSeleccionado === "" || p.tipo === tipoSeleccionado;

    return coincideTexto && coincideTipo;
  });

  mostrar(filtradas);
}

buscador.addEventListener("input", filtrar);
tipo.addEventListener("change", filtrar);

mostrar(propiedades);

/* SLIDER */
document.addEventListener("click", function(e){
  if(e.target.classList.contains("next") || e.target.classList.contains("prev")){
    
    const slider = e.target.closest(".slider");
    const slides = slider.querySelectorAll(".slide");
    let index = Array.from(slides).findIndex(s => s.classList.contains("active"));

    slides[index].classList.remove("active");

    if(e.target.classList.contains("next")){
      index = (index + 1) % slides.length;
    } else {
      index = (index - 1 + slides.length) % slides.length;
    }

    slides[index].classList.add("active");
  }
});
</script>

</body>
</html>
