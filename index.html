<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar | Inmobiliaria</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
:root{
  --azul:#1e3a5f;
  --gris:#f8fafc;
  --texto:#1f2937;
  --borde:#e5e7eb;
  --rojo:#ef4444;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--gris);
  color:var(--texto);
}

.header{
  background:#fff;
  padding:18px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--borde);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-weight:700;
  font-size:1.2rem;
  color:var(--azul);
}

.container{
  display:flex;
  max-width:1300px;
  margin:auto;
  gap:30px;
  padding:40px;
}

.sidebar{
  width:260px;
  background:#fff;
  padding:20px;
  border-radius:16px;
  border:1px solid var(--borde);
}

.sidebar h3{
  margin-top:0;
  font-size:1rem;
}

.sidebar input,.sidebar select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid var(--borde);
  background:#fff;
}

.content{flex:1;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:35px;
}

.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--borde);
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  transition:0.25s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.slider{
  height:240px;
  position:relative;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:.4s;
}

.slide.active{opacity:1;}

.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:var(--rojo);
  color:#fff;
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
}

.card-content{
  padding:25px;
}

.precio{
  font-size:1.9rem;
  font-weight:700;
  color:var(--rojo);
}

h3{
  margin:10px 0;
  font-size:1.05rem;
}

.ubicacion{
  color:#6b7280;
  font-size:13px;
}

.detalle{
  font-size:13px;
  margin-top:5px;
}

.btn{
  display:block;
  background:var(--azul);
  color:#fff;
  text-align:center;
  padding:12px;
  border-radius:12px;
  margin-top:15px;
  text-decoration:none;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.03);
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:90%;
  max-width:600px;
  border-radius:20px;
  padding:30px;
}

@media(max-width:900px){
  .container{flex-direction:column;padding:20px;}
  .sidebar{width:100%;}
}
</style></head><body><div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div><div class="container"><div class="sidebar">
  <h3>Filtros</h3>
  <input id="buscador" placeholder="Buscar propiedad...">
  <select id="tipo">
    <option value="">Tipo</option>
    <option value="casa">Casa</option>
    <option value="terreno">Terreno</option>
    <option value="bodega">Bodega</option>
  </select>
</div><div class="content">
  <div class="cards" id="contenedor"></div>
</div></div><div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div><script src="propiedades.js"></script><script>
const contenedor=document.getElementById("contenedor");
const buscador=document.getElementById("buscador");
const tipo=document.getElementById("tipo");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

function mostrar(lista){
  contenedor.innerHTML="";
  lista.forEach(p=>{
    contenedor.innerHTML+=`
    <div class="card" onclick='abrirModal(${JSON.stringify(p)})'>
      <div class="slider">
        ${p.destacado?'<span class="badge">🔥 Destacado</span>':''}
        ${p.imagenes.map((img,i)=>`<img src="${img}" class="slide ${i===0?'active':''}">`).join('')}
      </div>
      <div class="card-content">
        <div class="precio">${p.precio}</div>
        <h3>${p.nombre}</h3>
        <div class="ubicacion">📍 ${p.ubicacion}</div>
        <div class="detalle">📐 ${p.terreno}</div>
        <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
      </div>
    </div>`;
  });
}

function filtrar(){
  const texto=buscador.value.toLowerCase();
  const tipoSel=tipo.value;

  const filtradas=propiedades.filter(p=>{
    return (
      (p.nombre.toLowerCase().includes(texto) || p.ubicacion.toLowerCase().includes(texto)) &&
      (tipoSel==="" || p.tipo===tipoSel)
    );
  });

  mostrar(filtradas);
}

buscador.addEventListener("input",filtrar);
tipo.addEventListener("change",filtrar);

function abrirModal(p){
  modal.style.display="flex";
  modalContent.innerHTML=`
    <h2>${p.nombre}</h2>
    <p><strong>Precio:</strong> ${p.precio}</p>
    <p>${p.ubicacion}</p>
    <p>${p.terreno}</p>
    <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
  `;
}

modal.onclick=()=>modal.style.display="none";

mostrar(propiedades);
</script></body>
</html>
