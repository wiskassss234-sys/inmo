<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f8fafc;}

/* HEADER */
.header{
  background:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
}
.logo{font-weight:700;color:var(--primary);}

/* HERO */
.hero{
  height:300px;
  background:url('https://images.unsplash.com/photo-1560518883-ce09059eeffa') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.overlay{
  background:rgba(0,0,0,0.5);
  padding:25px;
  border-radius:15px;
  text-align:center;
  color:#fff;
}

.overlay input{
  margin-top:10px;
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
}

/* CONTENIDO */
.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{
  border-radius:18px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 50px rgba(0,0,0,0.15);
}

/* SLIDER */
.slider{position:relative;}

.slider img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* overlay info */
.info-img{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  color:#fff;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.price{
  font-weight:700;
  font-size:18px;
}

/* flechas */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:#fff;
  padding:5px 10px;
  border-radius:50%;
  cursor:pointer;
}

.nav.left{left:10px;}
.nav.right{right:10px;}

/* dots */
.dots{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
}

.dot{
  height:8px;
  width:8px;
  margin:0 3px;
  background:#ccc;
  border-radius:50%;
  display:inline-block;
}

.dot.active{
  background:#fff;
}

/* info abajo */
.card-content{
  padding:15px;
}

.sub{
  font-size:13px;
  color:#64748b;
}

/* botón */
.btn{
  display:block;
  margin-top:10px;
  background:#25D366;
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Mi Dulce Hogar</div>
</div>

<div class="hero">
  <div class="overlay">
    <h2>Encuentra tu propiedad ideal</h2>
    <input type="text" id="busqueda" placeholder="Buscar ubicación...">
  </div>
</div>

<div class="container">
  <div class="cards" id="contenedor"></div>
</div>

<script src="propiedades.js"></script>

<script>
const contenedor=document.getElementById("contenedor");
const busqueda=document.getElementById("busqueda");

const state={};

function mostrar(lista){
  contenedor.innerHTML="";

  lista.forEach((p,i)=>{
    state[i]={index:0};

    contenedor.innerHTML+=`
    <div class="card">
      
      <div class="slider"
        ontouchstart="touchStart(event,${i})"
        ontouchend="touchEnd(event,${i})">

        <img id="img-${i}" src="${p.imagenes[0]}">

        <div class="nav left" onclick="prev(${i})">❮</div>
        <div class="nav right" onclick="next(${i})">❯</div>

        <div class="info-img">
          <div class="price">${p.precio}</div>
          <div>${p.nombre}</div>
          <div class="sub">${p.ubicacion}</div>
        </div>

        <div class="dots" id="dots-${i}">
          ${p.imagenes.map((_,d)=>`<span class="dot ${d===0?'active':''}"></span>`).join("")}
        </div>
      </div>

      <div class="card-content">
        <div class="sub">${p.terreno || ""}</div>

        ${p.extra?`<ul>${p.extra.map(e=>`<li>${e}</li>`).join("")}</ul>`:""}

        <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar</a>
      </div>
    </div>`;
  });
}

function updateSlider(i){
  const p=propiedades[i];
  const idx=state[i].index;

  document.getElementById(`img-${i}`).src=p.imagenes[idx];

  const dots=document.querySelectorAll(`#dots-${i} .dot`);
  dots.forEach(d=>d.classList.remove("active"));
  if(dots[idx]) dots[idx].classList.add("active");
}

function next(i){
  const p=propiedades[i];
  state[i].index=(state[i].index+1)%p.imagenes.length;
  updateSlider(i);
}

function prev(i){
  const p=propiedades[i];
  state[i].index--;
  if(state[i].index<0) state[i].index=p.imagenes.length-1;
  updateSlider(i);
}

let startX=0;

function touchStart(e){
  startX=e.changedTouches[0].screenX;
}

function touchEnd(e,i){
  let endX=e.changedTouches[0].screenX;
  if(startX-endX>50) next(i);
  if(endX-startX>50) prev(i);
}

busqueda.addEventListener("input",()=>{
  const valor=busqueda.value.toLowerCase();
  const filtradas=propiedades.filter(p=>p.ubicacion.toLowerCase().includes(valor));
  mostrar(filtradas);
});

mostrar(propiedades);
</script>

</body>
</html>
