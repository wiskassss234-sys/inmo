<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dulce Hogar | Nivel Empresa</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{
  --primary:#3b82f6; /* azul moderno */
  --bg:#f1f5f9;
  --text:#1e293b;
  --sub:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;transition:.25s;}
body{background:var(--bg);} 

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{font-weight:700;color:var(--primary);} 

.search-bar{
  display:flex;
  gap:10px;
  border:1px solid var(--border);
  padding:8px 15px;
  border-radius:999px;
  background:#fff;
}

.search-bar input{
  border:none;
  outline:none;
}

.chips{
  display:flex;
  gap:10px;
  padding:15px 25px;
  overflow-x:auto;
}

.chip{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:13px;
  background:#fff;
}

.chip.active{
  background:var(--primary);
  color:#fff;
  border:none;
}

.container{max-width:1300px;margin:auto;padding:20px;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{cursor:pointer;}

.img-box{
  position:relative;
  border-radius:18px;
  overflow:hidden;
}

.img-box img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card:hover img{transform:scale(1.06);} 

.heart{
  position:absolute;
  top:10px;
  right:10px;
  background:#fff;
  border-radius:50%;
  padding:6px;
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:var(--primary);
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

.card-content{margin-top:10px;}

.top{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  font-weight:600;
}

.sub{
  color:var(--sub);
  font-size:13px;
  margin-top:3px;
}

.price{
  margin-top:6px;
  font-weight:700;
}

.btn{
  display:block;
  margin-top:15px;
  background:var(--primary);
  color:#fff;
  padding:12px;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:90%;
  max-width:650px;
  border-radius:20px;
  padding:25px;
}

</style></head><body><div class="header">
  <div class="logo">Mi Dulce Hogar</div>
  <div class="search-bar">
    <input id="buscador" placeholder="Buscar propiedades...">
  </div>
</div><div class="chips">
  <div class="chip active" onclick="filtrarTipo('', event)">Todos</div>
  <div class="chip" onclick="filtrarTipo('casa', event)">Casas</div>
  <div class="chip" onclick="filtrarTipo('terreno', event)">Terrenos</div>
  <div class="chip" onclick="filtrarTipo('bodega', event)">Bodegas</div>
</div><div class="container">
  <div class="cards" id="contenedor"></div>
</div><div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div><script src="propiedades.js"></script><script>
let tipoActivo="";
let favoritos=[];

const contenedor=document.getElementById("contenedor");
const buscador=document.getElementById("buscador");
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

function mostrar(lista){
  contenedor.innerHTML="";
  lista.forEach((p,i)=>{
    const fav=favoritos.includes(i);
    contenedor.innerHTML+=`
    <div class="card" onclick='abrirModal(${JSON.stringify(p)})'>
      <div class="img-box">
        ${p.destacado?'<div class="badge">Nuevo</div>':''}
        <img src="${p.imagenes[0]}">
        <div class="heart" onclick="event.stopPropagation();toggleFav(${i})">${fav?'💙':'🤍'}</div>
      </div>
      <div class="card-content">
        <div class="top">
          <span>${p.ubicacion}</span>
          <span>★ 4.9</span>
        </div>
        <div class="sub">${p.nombre}</div>
        <div class="price">${p.precio}</div>
      </div>
    </div>`;
  });
}

function filtrar(){
  const texto=buscador.value.toLowerCase();
  const filtradas=propiedades.filter(p=>
    (p.nombre.toLowerCase().includes(texto)||p.ubicacion.toLowerCase().includes(texto)) &&
    (tipoActivo===""||p.tipo===tipoActivo)
  );
  mostrar(filtradas);
}

function filtrarTipo(tipo, e){
  tipoActivo=tipo;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  filtrar();
}

function toggleFav(i){
  if(favoritos.includes(i)){
    favoritos=favoritos.filter(f=>f!==i);
  }else{favoritos.push(i);} 
  filtrar();
}

buscador.addEventListener("input",filtrar);

function abrirModal(p){
  modal.style.display="flex";
  modalContent.innerHTML=`
    <h2>${p.nombre}</h2>
    <p><strong>${p.precio}</strong></p>
    <p>${p.ubicacion}</p>
    <p>${p.terreno}</p>
    <a href="https://wa.me/524444917754?text=${encodeURIComponent(p.whatsapp)}" class="btn">Contactar por WhatsApp</a>
  `;
}

modal.onclick=()=>modal.style.display="none";

mostrar(propiedades);
</script></body>
</html>
